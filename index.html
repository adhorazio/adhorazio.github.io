<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spiking Neuromorphics</title>
  <style>
    :root {
      --bg: #2b2b2b;
      --surface: #333333;
      --border: #444444;
      --text: #e0e0e0;
      --text-dim: #888888;
      --accent: #009ADE;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 1rem 0 1.5rem;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-title img {
      height: 4rem;
      width: auto;
      filter: brightness(0) saturate(100%) invert(19%) sepia(97%) saturate(2084%) hue-rotate(322deg) brightness(105%) contrast(103%);
      opacity: 1;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    header h1 span { color: var(--text); }

    header p {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 760px;
    }

    /* ── Nav items ── */
    .nav-grid {
      display: flex;
      gap: 1rem;
    }

    .nav-item {
      position: relative;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .nav-btn .arrow {
      font-size: 0.6rem;
      transition: transform 0.15s;
    }

    .nav-item:hover .nav-btn,
    .nav-item:focus-within .nav-btn {
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-item:hover .arrow,
    .nav-item:focus-within .arrow {
      transform: rotate(180deg);
    }

    /* ── Dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0;
      min-width: 180px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.15s, transform 0.15s;
      z-index: 10;
    }

    .nav-item:hover .dropdown,
    .nav-item:focus-within .dropdown {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .dropdown a {
      display: block;
      padding: 0.45rem 1rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.12s, background 0.12s;
    }

    .dropdown a:hover {
      color: var(--accent);
      background: rgba(0,154,222,0.06);
    }

    /* ── Disabled nav item ── */
    .nav-btn.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: 760px;
      padding: 2rem 0 1rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      margin-top: 2.5rem;
    }

    footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Spiking <span>Neuromorphics</span></h1>
    <img src="assets/img/AP_HH.svg" alt="HH action potential" />
  </div>
  <p>How Far Can Minimal Models Reproduce Neural Dynamics?</p>
</header>

<main>
  <nav class="nav-grid">

    <div class="nav-item">
      <div class="nav-btn">Neuron Models <span class="arrow">▼</span></div>
      <div class="dropdown">
        <a href="models/izhikevich.html">Izhikevich Model</a>
      </div>
    </div>

    <div class="nav-item">
      <div class="nav-btn">Networks <span class="arrow">▼</span></div>
      <div class="dropdown">
        <a href="networks/clione.html">Clione</a>
      </div>
    </div>

  </nav>
</main>

<footer>
  <span>&#169; 2026 Adrien d&#x2019;Hollande. All rights reserved.</span>
  <a href="LICENSE">MIT License</a>
</footer>

</body>
</html>
